<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="2">
<style>
  body{background:#08090d;color:#5c6478;font-family:system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
  .w{text-align:center}
  .d{width:48px;height:48px;border-radius:12px;background:#14161e;border:1px solid #1e2028;
    display:inline-flex;align-items:center;justify-content:center;font-size:20px;
    margin-bottom:16px;animation:p 1.5s ease-in-out infinite}
  p{font-size:13px;font-weight:500}
  @keyframes p{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body><div class="w"><div class="d">&#x25C8;</div><p>Starting VNC...</p></div></body>
</html>
